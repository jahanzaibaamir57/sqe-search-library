name: CI - Search Library

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup .NET 10 environment
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      # Step 3: Restore dependencies
      - name: Restore dependencies
        run: |
          dotnet restore "SearchLibrary/SearchLibrary.csproj"
          dotnet restore "SearchLibrary.Tests/SearchLibrary.Tests.csproj"

      # Step 4: Build the projects
      - name: Build projects
        run: |
          dotnet build "SearchLibrary/SearchLibrary.csproj" --no-restore --configuration Release
          dotnet build "SearchLibrary.Tests/SearchLibrary.Tests.csproj" --no-restore --configuration Release

      # Step 5: Run tests with coverage
      - name: Run tests with XPlat Code Coverage
        run: |
          dotnet test "SearchLibrary.Tests/SearchLibrary.Tests.csproj" \
            --no-build \
            --configuration Release \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      # Step 6: Upload test results as artifacts
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xunit-test-results
          path: TestResults/*.trx
          retention-days: 30

      # Step 7: Upload coverage report
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: TestResults/**/coverage.cobertura.xml
          retention-days: 30
